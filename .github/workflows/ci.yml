name: dbt-core CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies & tools
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install dbt-core dbt-postgres sqlfluff elementary-data

      - name: Run sqlfluff lint
        run: sqlfluff lint dbt_npb_player_profiles/models/
        # 失敗したらジョブ全体が失敗する
        continue-on-error: false

      - name: Run dbt deps
        run: dbt deps --project-dir dbt_npb_player_profiles --profiles-dir dbt_npb_player_profiles/profiles

      - name: Run dbt parse
        run: dbt parse --project-dir dbt_npb_player_profiles --profiles-dir dbt_npb_player_profiles/profiles
